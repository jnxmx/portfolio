<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ivan Yakushev</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="top-bar">
        <a href="#home" class="name">ivan yakushev</a>
        <nav class="top-menu">
            <a href="#exhibitions">exhibitions</a>
            <a href="#motion">motion</a>
            <a href="#design">design</a>
            <a href="#workshops">workshops</a>
            <a href="https://course.yakushev.fr" target="_blank" rel="noopener">course</a>
        </nav>
    </header>

    <main class="container" id="content-area">
        <section id="home" class="page active">
            <div class="bio">
                <a href="#" class="email-link" data-user="ivan" data-domain="yakushev.fr"></a>
                <div>visual artist (digital, generative, time-based)</div>
                <div>educator (ENSAD Nancy)</div>
                <div>based in france</div>
                <div>born 1987, moscow</div>
            </div>
        </section>

        <section id="exhibitions" class="page">
            <div class="gallery">
                <img src="assets/audela38.jpg" alt="Exhibition ENSAD Nancy 38">
                <img src="assets/audela.jpg" alt="Exhibition ENSAD Nancy 22">
                <img src="assets/audela35.jpg" alt="Exhibition ENSAD Nancy 35">
                <img src="assets/audela36.jpg" alt="Exhibition ENSAD Nancy 36">
            </div>
        </section>

        <section id="motion" class="page">
            <div class="gallery">
                <video src="assets/motion/truth.mp4" controls preload="metadata" poster="assets/motion/truth_poster.jpg"></video>
                <video src="assets/motion/dark.mp4" controls preload="metadata" poster="assets/motion/dark_poster.jpg"></video>
                <video src="assets/motion/eyeyeeye.mp4" controls preload="metadata" poster="assets/motion/eyeyeeye_poster.jpg"></video>
                <video src="assets/motion/00108000.mp4" controls preload="metadata" poster="assets/motion/00108000_poster.jpg"></video>
                <video src="assets/motion/Never%20on%20saturdays.mp4" controls preload="metadata" poster="assets/motion/Never%20on%20saturdays_poster.jpg"></video>
                <video src="assets/motion/otdalenie.mp4" controls preload="metadata" poster="assets/motion/otdalenie_poster.jpg"></video>
                <video src="assets/motion/flower.mp4" controls preload="metadata" poster="assets/motion/flower_poster.jpg"></video>
            </div>
        </section>

        <section id="design" class="page">
            <div class="gallery">
            </div>
        </section>

        <section id="workshops" class="page">
            <div class="gallery">
                <img src="assets/workshops/workshop_01.png" alt="Workshop">
                <img src="assets/workshops/workshop_02.jpg" alt="Workshop Poster">
                <img src="assets/workshops/workshop_03.jpg" alt="Workshop Image">
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
